on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at noon UTC
  workflow_dispatch:       # Also allow manual trigger


name: Update Report


jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: ${{ runner.temp }}/R/library
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2


      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          mkdir -p "$R_LIBS_USER"
          Rscript -e "install.packages(c('tidyverse', 'lubridate', 'knitr', 'quarto'), repos='https://cloud.r-project.org')"

      - name: Run pipeline
        run: Rscript run-all.R


      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
