on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at noon UTC
  workflow_dispatch:       # Also allow manual trigger


name: Update Report


jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2


      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          echo "=== R_LIBS_USER before install ==="
          echo "$R_LIBS_USER"
          echo "=== .libPaths() before install ==="
          Rscript -e ".libPaths()"
          Rscript -e "install.packages(c('tidyverse', 'lubridate', 'knitr', 'quarto'), repos='https://cloud.r-project.org')"
          echo "=== .libPaths() after install ==="
          Rscript -e ".libPaths()"
          echo "=== tidyverse installed? ==="
          Rscript -e "cat(rownames(installed.packages()), sep='\n')" | grep tidyverse || echo "tidyverse NOT FOUND"

      - name: Run pipeline
        run: |
          echo "=== R_LIBS_USER in run step ==="
          echo "$R_LIBS_USER"
          echo "=== .libPaths() in run step ==="
          Rscript -e ".libPaths()"
          Rscript run-all.R


      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
